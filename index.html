<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c1a20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breathe">
<title>Breathe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @property --accent {
    syntax: '<color>'; inherits: true; initial-value: #54d1c4;
  }
  @property --accent2 {
    syntax: '<color>'; inherits: true; initial-value: #2fa8b8;
  }

  :root {
    --accent: #54d1c4;
    --accent2: #2fa8b8;
    --bg-a: #0c1a20;
    --bg-b: #070d12;
    --ink: #e7eef0;
    --ink-dim: rgba(231, 238, 240, 0.55);
    --ink-faint: rgba(231, 238, 240, 0.30);
    --line: rgba(231, 238, 240, 0.10);
    --orb: clamp(170px, 54vw, 300px);
    /* Filter/timer button diameter: scales with viewport width so it reads
       clearly on any phone, while the min/max bounds keep it touch-friendly
       on small screens and prevent it from ballooning on tablets/desktop.
       At 12vw it stays well clear of the orb's gutter at every width — the
       orb itself only ever claims 54vw, leaving 23vw of gutter per side. */
    --rail-btn: clamp(46px, 13.8vw, 67px);
    transition: --accent 0.9s ease, --accent2 0.9s ease;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  button { touch-action: manipulation; }

  html {
    height: 100%;
    background: var(--bg-b);
  }

  body {
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1100px 820px at 50% 40%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 62%),
      linear-gradient(160deg, var(--bg-a), var(--bg-b) 70%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition: --accent 0.9s ease, --accent2 0.9s ease, filter 0.25s ease;
  }

  /* ---------- Header ---------- */
  .head {
    width: 100%;
    max-width: 480px;
    padding: 22px 20px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 3;
  }

  .wordmark {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    user-select: none;
  }

  .toggle {
    display: flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(6px);
  }

  .seg {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 8px 15px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.35s ease, background 0.35s ease;
    white-space: nowrap;
  }
  .seg:hover { color: var(--ink); }
  .seg[aria-pressed="true"] {
    color: #08131a;
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, #fff), var(--accent));
    box-shadow: 0 4px 18px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .seg:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .pattern {
    font-size: 12.5px;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    text-align: center;
    min-height: 16px;
    transition: color 0.4s ease;
  }
  .pattern b { color: var(--ink-dim); font-weight: 500; }

  /* ---------- Stage ---------- */
  .stage {
    flex: 1;
    width: 100%;
    display: grid;
    place-items: center;
    position: relative;
    min-height: 0;
  }
  .center {
    position: relative;
    width: var(--orb);
    height: var(--orb);
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  .breather {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    will-change: transform;
    transform: scale(0.52);
    pointer-events: none;
  }
  .orb-glow {
    position: absolute;
    width: 128%;
    height: 128%;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 60%, transparent) 0%, transparent 66%);
    filter: blur(34px);
    opacity: var(--glow, 0.4);
    transition: opacity 0.2s linear;
    pointer-events: none;
  }
  .orb {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 34%,
        color-mix(in srgb, var(--accent) 45%, #ffffff) 0%,
        var(--accent) 46%,
        var(--accent2) 100%);
    box-shadow:
      inset 0 0 42px rgba(255, 255, 255, 0.14),
      inset 0 -22px 52px rgba(0, 0, 0, 0.28),
      0 0 46px color-mix(in srgb, var(--accent) 26%, transparent);
    pointer-events: none;
  }
  .orb::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.16);
  }

  .readout {
    position: relative;
    z-index: 2;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  .phase-word {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300;
    /* sized off the circle, not the viewport, so text-to-edge padding is consistent */
    font-size: calc(var(--orb) * 0.125);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #f3f8f9;
    text-shadow: 0 1px 20px rgba(0, 0, 0, 0.35);
    /* nudge right to offset trailing letter-spacing + left-heavy glyph stems;
       translateZ(0) promotes this to its own compositor layer so swapping the
       text node repaints in isolation instead of jittering the whole readout */
    transform: translateX(0.05em) translateZ(0);
    backface-visibility: hidden;
    transition: opacity 0.16s ease;
  }
  .phase-word.fading { opacity: 0; }
  .count {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.72);
    font-variant-numeric: tabular-nums;
    min-height: 18px;
    /* offset the larger trailing letter-spacing on the single digit */
    transform: translateX(0.09em);
  }
  /* when there's no countdown (Ready / Paused / Done), don't reserve its space
     so the word sits dead-center in the circle */
  .count:empty { display: none; }

  /* ---------- Controls ---------- */
  .controls {
    width: 100%;
    max-width: 480px;
    padding: 0 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 6; /* above the side rails (z-index 4) so the volume popup can render over them */
  }

  .pace {
    width: 100%;
    max-width: 320px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  .pace.hidden { visibility: hidden; opacity: 0; }
  .pace label {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .pace output {
    font-size: 12px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 66px;
  }
  /* Range sliders: the input's own box is the touch target (tall), while the
     visible track is drawn as a thin pseudo-element line centered inside it.
     touch-action: none stops the browser from waiting to see if this is a
     scroll gesture before allowing the drag — that wait is what made sliders
     feel like they needed a few tries on mobile. */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    flex: 1;
    height: 40px;
    margin: 0;
    background: transparent;
    outline: none;
    cursor: pointer;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent) var(--fill, 25%), var(--line) var(--fill, 25%));
  }
  input[type="range"]::-moz-range-track {
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent) var(--fill, 25%), var(--line) var(--fill, 25%));
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
    cursor: pointer;
    margin-top: -7.5px; /* centers the 18px thumb on the 3px track */
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border: 0; border-radius: 50%;
    background: var(--ink);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
    cursor: pointer;
  }
  input[type="range"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; }

  /* Coarse pointers (touch) get an even larger thumb and touch target */
  @media (pointer: coarse) {
    input[type="range"] { height: 44px; }
    input[type="range"]::-webkit-slider-thumb {
      width: 24px; height: 24px;
      margin-top: -10.5px;
    }
    input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; }
  }

  .row {
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .start {
    appearance: none;
    flex: 1;
    height: 48px;
    padding: 0 22px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--ink);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.1s ease;
  }
  .start:hover { background: color-mix(in srgb, var(--accent) 22%, transparent); }
  .start:active { transform: scale(0.98); }
  .start:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .snd, .rst {
    appearance: none;
    flex: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-faint);
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.1s ease;
  }
  .snd:hover, .rst:hover { color: var(--ink-dim); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
  .snd:active, .rst:active { transform: scale(0.95); }
  .snd:focus-visible, .rst:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .snd svg, .rst svg { width: 15px; height: 15px; display: block; flex: none; }
  .snd .ic-on { display: none; }
  .snd[aria-pressed="true"] .ic-off { display: none; }
  .snd[aria-pressed="true"] .ic-on { display: block; }
  .snd[aria-pressed="true"] {
    color: var(--ink);
    border-color: color-mix(in srgb, var(--accent) 45%, transparent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .snd small, .rst small {
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
  }
  .snd small { font-size: 8px; }
  .rst small { font-size: 7px; letter-spacing: 0.03em; margin-top: 1px; }
  .snd { -webkit-touch-callout: none; user-select: none; }

  /* ---------- Volume popup (vertical fader) ----------
     position: fixed + a very high z-index means this always renders above
     everything else on the page (rails, timer buttons, etc.) regardless of
     any ancestor stacking-context quirks. Its on-screen position is computed
     in JS from the sound button's actual location — see positionVolPop(). */
  .snd-wrap { position: relative; flex: none; display: inline-flex; }
  .vol-pop {
    position: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 14px 10px;
    border-radius: 18px;
    background: color-mix(in srgb, var(--bg-a) 84%, #000);
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
    box-shadow: 0 12px 34px rgba(0, 0, 0, 0.5);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    z-index: 999;
    transform-origin: bottom center;
    opacity: 0;
    transform: translateX(-50%) translateY(6px) scale(0.95);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .vol-pop.open { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); pointer-events: auto; }
  .vol-pop::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left: -6px;
    border: 6px solid transparent;
    border-top-color: color-mix(in srgb, var(--bg-a) 84%, #000);
  }
  .vol-pop svg { width: 16px; height: 16px; color: var(--ink-dim); flex: none; }
  .vol-slider-wrap {
    position: relative;
    height: 104px;
    width: 44px;
  }
  .vol-slider {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 104px;
    margin: 0;
    flex: none;
    transform: translate(-50%, -50%) rotate(-90deg);
    transform-origin: center;
  }
  .vol-val {
    font-size: 11px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    text-align: center;
  }

  /* ---------- Side rails (timer + filter) ---------- */
  .timer-rail, .filter-rail {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    z-index: 4;
  }
  .timer-rail { right: 6px; }
  .filter-rail { left: 6px; }
  /* Filter-intensity fader: replaces the balancing line, running from below the
     filter button to the 20-min timer button's bottom edge. Max (most muted) is
     at the bottom; it rests at 3/4 so it can go a quarter more muted. */
  .filter-slider-wrap {
    position: relative;
    width: var(--rail-btn);
    height: 156px;
  }
  .filter-slider {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 156px;
    margin: 0;
    transform: translate(-50%, -50%) rotate(90deg);
    transform-origin: center;
  }
  .filter-slider:disabled { opacity: 0.35; cursor: not-allowed; }
  #filterBtn svg { width: calc(var(--rail-btn) * 0.37); height: calc(var(--rail-btn) * 0.37); display: block; }
  .timer-cap {
    font-size: clamp(9px, calc(var(--rail-btn) * 0.2), 11px);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1px;
  }
  .tbtn {
    appearance: none;
    width: var(--rail-btn);
    height: var(--rail-btn);
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.02);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: clamp(13px, calc(var(--rail-btn) * 0.32), 18px);
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .tbtn small {
    font-size: clamp(7.5px, calc(var(--rail-btn) * 0.165), 10px);
    letter-spacing: 0.06em;
    font-weight: 700;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .tbtn:hover { color: var(--ink); border-color: color-mix(in srgb, var(--accent) 35%, transparent); }
  .tbtn[aria-pressed="true"] {
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 90%, #fff), var(--accent));
    color: #08131a;
    border-color: transparent;
    box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .tbtn[aria-pressed="true"] small { color: rgba(8, 19, 26, 0.72); }
  .tbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .cycles {
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
    min-height: 15px;
  }

  /* ---------- Footer instruction ---------- */
  .instruction {
    width: 100%;
    max-width: 480px;
    padding: 20px 22px calc(28px + env(safe-area-inset-bottom));
    text-align: center;
    font-size: 15px;
    letter-spacing: 0.01em;
    color: var(--ink-dim);
    line-height: 1.5;
    /* Fixed (not min-) height reserved for 2 lines of text: 20px top padding +
       2 x 22.5px line-height + 28px bottom padding. Phase instructions vary
       from ~17 to ~52 characters — with min-height, longer/shorter text made
       this box grow/shrink, which shrank/grew .stage (flex: 1) in turn and
       shifted the whole orb up and down between phases. A fixed height keeps
       every phase change perfectly still regardless of text length. */
    height: calc(93px + env(safe-area-inset-bottom));
    overflow: hidden;
    transition: color 0.4s ease, opacity 0.16s ease;
    z-index: 3;
  }
  .instruction.fading { opacity: 0; }

  @media (max-height: 620px) {
    :root {
      --orb: clamp(130px, 34vh, 220px);
      /* Short/landscape screens are height-constrained, not width-constrained,
         so size off vh here instead of vw. */
      --rail-btn: clamp(32px, 9vh, 44px);
    }
    .head { padding-top: 12px; gap: 10px; }
    .instruction { padding-bottom: 16px; height: calc(81px + env(safe-area-inset-bottom)); }
    .timer-rail, .filter-rail { gap: 6px; }
    .filter-slider-wrap { height: 126px; }
    .filter-slider { width: 126px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb-glow { transition: none; }
  }
</style>
</head>
<body>
  <header class="head">
    <div class="wordmark">Breathe</div>
    <div class="toggle" role="group" aria-label="Breathing technique">
      <button class="seg" data-key="resonance" aria-pressed="true">Resonance</button>
      <button class="seg" data-key="478" aria-pressed="false">4-7-8</button>
      <button class="seg" data-key="box" aria-pressed="false">Box</button>
    </div>
    <div class="pattern" id="pattern"></div>
  </header>

  <main class="stage">
    <div class="center">
      <div class="breather" id="breather">
        <div class="orb-glow"></div>
        <div class="orb"></div>
      </div>
      <div class="readout">
        <div class="phase-word" id="word">Ready</div>
        <div class="count" id="count"></div>
      </div>
    </div>
    <div class="filter-rail" role="group" aria-label="Display filter">
      <span class="timer-cap">filter</span>
      <button class="tbtn" id="filterBtn" aria-pressed="false" aria-label="Toggle warm dim filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="filter-slider-wrap">
        <input type="range" class="filter-slider" id="filterSlider" min="0" max="100" value="75" aria-label="Filter intensity" disabled>
      </div>
    </div>
    <div class="timer-rail" role="group" aria-label="Session timer">
      <span class="timer-cap">timer</span>
      <button class="tbtn" data-min="1" aria-pressed="false">1<small>min</small></button>
      <button class="tbtn" data-min="5" aria-pressed="false">5<small>min</small></button>
      <button class="tbtn" data-min="10" aria-pressed="false">10<small>min</small></button>
      <button class="tbtn" data-min="20" aria-pressed="false">20<small>min</small></button>
    </div>
  </main>

  <div class="controls">
    <div class="pace" id="pace">
      <label for="paceInput">Pace</label>
      <input type="range" id="paceInput" min="4" max="6" step="0.1" value="5.5" aria-label="Breath pace in seconds">
      <output id="paceOut">5.5s in / out</output>
    </div>
    <div class="row">
      <button class="rst" id="reset" aria-label="Reset cycle count">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <small>Reset</small>
      </button>
      <button class="start" id="start">Start</button>
      <div class="snd-wrap">
        <button class="snd" id="sound" aria-pressed="false" aria-label="Toggle sound cues (long-press or right-click for volume)">
          <svg class="ic-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          <svg class="ic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12"/></svg>
          <small id="sndLabel">Off</small>
        </button>
        <div class="vol-pop" id="volPop" role="dialog" aria-label="Volume" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12"/></svg>
          <div class="vol-slider-wrap">
            <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" aria-label="Volume level">
          </div>
          <span class="vol-val" id="volVal">80</span>
        </div>
      </div>
    </div>
    <div class="cycles" id="cycles"></div>
  </div>

  <footer class="instruction" id="instruction">Get comfortable. Press start when you're ready.</footer>

<script>
(function () {
  "use strict";

  var TECHNIQUES = {
    resonance: {
      name: "Resonance", purpose: "balance",
      accent: "#54d1c4", accent2: "#2fa8b8",
      dynamic: true
    },
    "478": {
      name: "4-7-8", purpose: "sleep",
      accent: "#9a8ce0", accent2: "#6e63c4",
      phases: [
        { type: "inhale",    sec: 4, word: "Inhale", text: "Breathe in through your nose" },
        { type: "hold-full", sec: 7, word: "Hold",   text: "Hold — stay full" },
        { type: "exhale",    sec: 8, word: "Exhale", text: "Breathe out through your mouth, with a soft whoosh" }
      ]
    },
    box: {
      name: "Box", purpose: "focus",
      accent: "#6c9be8", accent2: "#4b78c8",
      phases: [
        { type: "inhale",     sec: 4, word: "Inhale", text: "Breathe in through your nose" },
        { type: "hold-full",  sec: 4, word: "Hold",   text: "Hold — stay full" },
        { type: "exhale",     sec: 4, word: "Exhale", text: "Breathe out through your nose" },
        { type: "hold-empty", sec: 4, word: "Hold",   text: "Hold — stay empty" }
      ]
    }
  };

  var MIN = 0.52, MAX = 1.0;

  // ---- State ----
  var key = "resonance";
  var phases = [];
  var idx = 0;
  var elapsed = 0;      // seconds into current phase
  var running = false;
  var started = false;  // has a session begun (affects Resume vs Start)
  var cycles = 0;
  var paceSec = 5.5;
  var soundOn = false;
  var volume = 0.8;     // 0..1, adjustable via long-press / right-click on the sound button
  var timerMin = null;  // selected session length in minutes, or null for open-ended
  var last = performance.now();

  // ---- Elements ----
  var breather = document.getElementById("breather");
  var wordEl = document.getElementById("word");
  var countEl = document.getElementById("count");
  var instrEl = document.getElementById("instruction");
  var patternEl = document.getElementById("pattern");
  var cyclesEl = document.getElementById("cycles");

  // Shared, subtle cross-fade for text swaps: opacity only, no movement.
  // Guards against overlapping calls (e.g. rapid phase changes) by clearing
  // any fade already in progress on that element before starting a new one.
  var fadeTimers = new WeakMap();
  function fadeText(el, text) {
    if (el.textContent === text) return;
    var pending = fadeTimers.get(el);
    if (pending) clearTimeout(pending);
    el.classList.add("fading");
    var t = setTimeout(function () {
      el.textContent = text;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          el.classList.remove("fading");
        });
      });
    }, 160);
    fadeTimers.set(el, t);
  }
  function setWord(text) { fadeText(wordEl, text); }
  function setInstruction(text) { fadeText(instrEl, text); }
  var startBtn = document.getElementById("start");
  var soundBtn = document.getElementById("sound");
  var sndLabel = document.getElementById("sndLabel");
  var paceWrap = document.getElementById("pace");
  var paceInput = document.getElementById("paceInput");
  var paceOut = document.getElementById("paceOut");
  var segs = Array.prototype.slice.call(document.querySelectorAll(".seg"));
  var tbtns = Array.prototype.slice.call(document.querySelectorAll(".timer-rail .tbtn"));

  var ease = function (p) { return 0.5 - 0.5 * Math.cos(Math.PI * Math.min(Math.max(p, 0), 1)); };

  function buildPhases() {
    var t = TECHNIQUES[key];
    if (t.dynamic) {
      phases = [
        { type: "inhale", sec: paceSec, word: "Inhale", text: "Breathe in through your nose" },
        { type: "exhale", sec: paceSec, word: "Exhale", text: "Breathe out through your nose" }
      ];
    } else {
      phases = t.phases.map(function (p) { return Object.assign({}, p); });
    }
  }

  function patternText() {
    var t = TECHNIQUES[key];
    var nums = t.dynamic
      ? paceSec.toFixed(1) + " · " + paceSec.toFixed(1)
      : t.phases.map(function (p) { return p.sec; }).join(" · ");
    return "<b>" + t.purpose + "</b> &nbsp;·&nbsp; " + nums + " &nbsp;·&nbsp; seconds per phase";
  }

  function applyTechnique(newKey) {
    key = newKey;
    var t = TECHNIQUES[key];
    document.documentElement.style.setProperty("--accent", t.accent);
    document.documentElement.style.setProperty("--accent2", t.accent2);
    document.body.style.setProperty("--accent", t.accent);
    document.body.style.setProperty("--accent2", t.accent2);
    segs.forEach(function (b) { b.setAttribute("aria-pressed", String(b.dataset.key === key)); });
    paceWrap.classList.toggle("hidden", !t.dynamic);
    patternEl.innerHTML = patternText();
    buildPhases();
    idx = 0; elapsed = 0; cycles = 0;
    updateCycles();
    enterPhase(true);
  }

  function enterPhase(rest) {
    var ph = phases[idx];
    if (rest && !running) {
      setWord("Ready");
      setCount("");
      setInstruction(started ? "Paused. Press resume to continue." : "Get comfortable. Press start when you're ready.");
      setScale(MIN, 0);
      return;
    }
    setWord(ph.word);
    setInstruction(ph.text);
    if (soundOn) cue(ph.type);
  }

  function baseScale(type) {
    return (type === "inhale" || type === "hold-full") ? MAX : MIN;
  }

  function scaleFor(ph, p) {
    switch (ph.type) {
      case "inhale":     return MIN + (MAX - MIN) * ease(p);
      case "exhale":     return MIN + (MAX - MIN) * (1 - ease(p));
      case "hold-full":  return MAX;
      case "hold-empty": return MIN;
      default:           return MIN;
    }
  }

  var lastScaleStr = null;
  var lastGlowStr = null;
  var lastCountStr = null;

  function setScale(s, intensity) {
    var scaleStr = s.toFixed(4);
    if (scaleStr !== lastScaleStr) {
      breather.style.transform = "scale(" + scaleStr + ")";
      lastScaleStr = scaleStr;
    }
    var glow = 0.26 + 0.55 * intensity;
    var glowStr = glow.toFixed(3);
    if (glowStr !== lastGlowStr) {
      breather.style.setProperty("--glow", glowStr);
      lastGlowStr = glowStr;
    }
  }

  function setCount(text) {
    if (text === lastCountStr) return;
    lastCountStr = text;
    countEl.textContent = text;
  }

  function cycleLen() {
    var t = TECHNIQUES[key];
    if (t.dynamic) return 2 * paceSec;
    return t.phases.reduce(function (a, p) { return a + p.sec; }, 0);
  }

  function targetCycles() {
    if (!timerMin) return null;
    return Math.max(1, Math.round((timerMin * 60) / cycleLen()));
  }

  function updateCycles() {
    var tgt = targetCycles();
    if (tgt) {
      cyclesEl.textContent = cycles + " / " + tgt + " cycles";
    } else {
      cyclesEl.textContent = cycles === 1 ? "1 cycle" : cycles + " cycles";
    }
  }

  function complete() {
    running = false;
    started = false;
    setWord("Done");
    setCount("");
    setInstruction("Session complete. Take a moment.");
    setScale(MIN, 0);
    if (soundOn) cue("complete", true);
    setStartLabel();
  }

  function frame(now) {
    var dt = (now - last) / 1000;
    last = now;
    if (dt > 0.25) dt = 0.25; // guard against tab-switch jumps

    if (running) {
      var ph = phases[idx];
      elapsed += dt;
      var p = elapsed / ph.sec;
      var s = scaleFor(ph, p);
      var intensity = (s - MIN) / (MAX - MIN);
      setScale(s, intensity);

      var remain = Math.max(0, Math.ceil(ph.sec - elapsed));
      setCount(remain > 0 ? String(remain) : "");

      if (elapsed >= ph.sec) {
        idx++;
        elapsed = 0;
        if (idx >= phases.length) {
          idx = 0;
          cycles++;
          updateCycles();
          var tgt = targetCycles();
          if (tgt && cycles >= tgt) { complete(); }
        }
        if (running) enterPhase(false);
      }
    }
    requestAnimationFrame(frame);
  }

  // ---- Sound cues (gentle, optional) ----
  var actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function cue(type, long) {
    if (!actx || volume <= 0) return;
    var freq = 440;
    if (type === "inhale") freq = 528;
    else if (type === "exhale") freq = 396;
    else if (type === "complete") freq = 528;
    var t0 = actx.currentTime;
    var dur = long ? 2.8 : 0.95;
    var attack = long ? 0.3 : 0.08;
    var peak = (long ? 0.42 : 0.38) * volume;   // louder base, scaled by user volume
    var osc = actx.createOscillator();
    var g = actx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur - 0.05);
    osc.connect(g); g.connect(actx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  }

  // ---- Controls ----
  function setStartLabel() {
    startBtn.textContent = running ? "Pause" : (started ? "Resume" : "Start");
  }

  startBtn.addEventListener("click", function () {
    running = !running;
    if (running) {
      if (!started) { idx = 0; elapsed = 0; cycles = 0; updateCycles(); }
      started = true;
      last = performance.now();
      enterPhase(false);
    } else {
      // Freeze the orb where it is; only update the text.
      setWord("Paused");
      setCount("");
      setInstruction("Paused. Press resume to continue.");
    }
    setStartLabel();
  });

  segs.forEach(function (b) {
    b.addEventListener("click", function () {
      running = false;
      started = false;
      setStartLabel();
      applyTechnique(b.dataset.key);
    });
  });

  // ---- Warm filter: button toggles on/off, fader sets intensity ----
  var warmOn = false;
  var filterLevel = 0.75;   // 0 = none (top), 0.75 = default look, 1 = most muted (bottom)
  var filterSlider = document.getElementById("filterSlider");

  function computeFilter(t) {
    // interpolate from identity (t=0) through the original look (t=0.75)
    var b = (1 - 0.26667 * t).toFixed(4);
    var s = (1 - 0.53333 * t).toFixed(4);
    var se = (0.24 * t).toFixed(4);
    var c = (1 - 0.06667 * t).toFixed(4);
    return "brightness(" + b + ") saturate(" + s + ") sepia(" + se + ") contrast(" + c + ")";
  }
  function applyFilter() {
    document.body.style.filter = warmOn ? computeFilter(filterLevel) : "";
  }

  filterSlider.style.setProperty("--fill", filterSlider.value + "%");
  filterSlider.addEventListener("input", function () {
    filterLevel = parseInt(this.value, 10) / 100;
    this.style.setProperty("--fill", this.value + "%");
    applyFilter();
  });

  document.getElementById("filterBtn").addEventListener("click", function () {
    warmOn = !warmOn;
    this.setAttribute("aria-pressed", String(warmOn));
    filterSlider.disabled = !warmOn;
    var tm = document.querySelector('meta[name="theme-color"]');
    if (tm) tm.setAttribute("content", warmOn ? "#12120d" : "#0c1a20");
    applyFilter();
  });

  document.getElementById("reset").addEventListener("click", function () {
    idx = 0;
    elapsed = 0;
    cycles = 0;
    updateCycles();
    if (running) {
      // Keep breathing, but start the count over from the first inhale.
      last = performance.now();
      enterPhase(false);
    } else {
      // Return to a clean pre-start state.
      started = false;
      setStartLabel();
      enterPhase(true);
    }
  });

  paceInput.addEventListener("input", function () {
    paceSec = parseFloat(paceInput.value);
    paceOut.textContent = paceSec.toFixed(1) + "s in / out";
    var fill = ((paceSec - 4) / (6 - 4)) * 100;
    paceInput.style.setProperty("--fill", fill + "%");
    if (key === "resonance") {
      buildPhases();
      patternEl.innerHTML = patternText();
      updateCycles();
    }
  });

  tbtns.forEach(function (b) {
    b.addEventListener("click", function () {
      var m = parseInt(b.dataset.min, 10);
      timerMin = (timerMin === m) ? null : m;
      tbtns.forEach(function (x) {
        x.setAttribute("aria-pressed", String(parseInt(x.dataset.min, 10) === timerMin));
      });
      updateCycles();
    });
  });

  // ---- Sound toggle + volume popup ----
  function toggleSound() {
    soundOn = !soundOn;
    soundBtn.setAttribute("aria-pressed", String(soundOn));
    sndLabel.textContent = soundOn ? "On" : "Off";
    if (soundOn) { ensureAudio(); cue("inhale"); }
  }

  var volPop = document.getElementById("volPop");
  var volSlider = document.getElementById("volSlider");
  var volVal = document.getElementById("volVal");
  var volOpen = false;
  var lastPreview = 0;

  function setVolFill() {
    volSlider.style.setProperty("--fill", volSlider.value + "%");
    volVal.textContent = volSlider.value;
  }
  function positionVolPop() {
    var r = soundBtn.getBoundingClientRect();
    volPop.style.left = (r.left + r.width / 2) + "px";
    volPop.style.bottom = (window.innerHeight - r.top + 12) + "px";
  }
  function openVol() {
    ensureAudio();
    volSlider.value = Math.round(volume * 100);
    setVolFill();
    positionVolPop();
    volPop.classList.add("open");
    volPop.setAttribute("aria-hidden", "false");
    volOpen = true;
  }
  function closeVol() {
    volPop.classList.remove("open");
    volPop.setAttribute("aria-hidden", "true");
    volOpen = false;
  }

  volSlider.addEventListener("input", function () {
    volume = parseInt(this.value, 10) / 100;
    setVolFill();
    var now = performance.now();
    if (now - lastPreview > 140) { lastPreview = now; cue("hold-full"); } // preview level
  });
  // Belt-and-suspenders: stop every relevant interaction event from bubbling
  // out of the popup, since some mobile browsers deliver touch interactions
  // on native <input type=range> thumbs inconsistently through the Pointer
  // Events pipeline.
  ["pointerdown", "touchstart", "mousedown"].forEach(function (evt) {
    volPop.addEventListener(evt, function (e) { e.stopPropagation(); }, { passive: true });
  });
  window.addEventListener("resize", function () { if (volOpen) positionVolPop(); });

  // Long-press (touch) opens the volume popup
  var lpTimer = null, longPressed = false;
  soundBtn.addEventListener("pointerdown", function (e) {
    if (e.pointerType === "mouse") return;   // desktop uses right-click instead
    longPressed = false;
    lpTimer = setTimeout(function () { longPressed = true; openVol(); }, 420);
  });
  function clearLP() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }
  soundBtn.addEventListener("pointerup", clearLP);
  soundBtn.addEventListener("pointerleave", clearLP);
  soundBtn.addEventListener("pointercancel", clearLP);

  soundBtn.addEventListener("click", function () {
    if (longPressed) { longPressed = false; return; }  // suppress toggle right after a long-press
    toggleSound();
  });
  soundBtn.addEventListener("contextmenu", function (e) {   // right-click on desktop
    e.preventDefault();
    if (volOpen) closeVol(); else openVol();
  });

  // Close the popup when interacting anywhere else. Using "click" (which
  // fires only once a full tap completes) rather than "pointerdown" (which
  // fires the instant a touch begins) means starting a drag on the slider
  // is never mistaken for an outside interaction — a drag's eventual click
  // still targets the slider itself, so it's correctly treated as "inside."
  document.addEventListener("click", function (e) {
    if (volOpen && !volPop.contains(e.target) && e.target !== soundBtn && !soundBtn.contains(e.target)) {
      closeVol();
    }
  });

  // Space toggles start/pause; Escape closes the volume popup
  window.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && volOpen) { closeVol(); return; }
    if (e.code === "Space" && e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON") {
      e.preventDefault();
      startBtn.click();
    }
  });

  // ---- Init ----
  paceInput.style.setProperty("--fill", (((5.5 - 4) / 2) * 100) + "%");
  applyTechnique("resonance");
  setStartLabel();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
